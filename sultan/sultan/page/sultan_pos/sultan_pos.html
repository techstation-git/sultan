<style>
    :root {
        --bg-primary: #0a0915;
        --bg-glass: rgba(15, 12, 30, 0.9);
        --border-glass: rgba(255, 255, 255, 0.08);
        --accent-purple: #8b5cf6;
        --accent-pink: #ec4899;
        --gradient-primary: linear-gradient(135deg, #8b5cf6, #ec4899);
    }
    
    /* Target container specific styles to avoid leaking to other Frappe pages */
    .sultan-desk-app {
        background-color: var(--bg-primary);
        min-height: calc(100vh - 100px);
        border-radius: 12px;
        color: #fff;
        font-family: 'Plus Jakarta Sans', sans-serif;
        display: flex;
        flex-direction: column;
        padding: 1.5rem;
    }
    
    .sultan-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border-glass);
    }

    .sultan-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1.25rem;
        flex: 1.5;
    }
    
    .sultan-item-card {
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--border-glass);
        border-radius: 16px;
        padding: 1rem;
        cursor: pointer;
        transition: 0.3s;
    }
    
    .sultan-item-card:hover {
        border-color: var(--accent-purple);
        background: rgba(255,255,255,0.05);
        transform: translateY(-3px);
    }
    
    .sultan-sidebar {
        flex: 1;
        background: rgba(0,0,0,0.2);
        border: 1px solid var(--border-glass);
        border-radius: 16px;
        padding: 1.5rem;
    }

    .accent-btn {
        background: var(--gradient-primary);
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 8px;
        font-weight: bold;
        width: 100%;
        cursor: pointer;
    }
</style>

<div class="sultan-desk-app">
    <div class="sultan-header">
        <h3>👑 Sultan Premium Station</h3>
        <div>
            <span class="badge badge-success" id="station-status">🟢 Connected Live</span>
        </div>
    </div>

    <div style="display: flex; gap: 1.5rem; flex: 1;">
        <!-- Left Menu -->
        <div style="flex: 2;">
            <div id="category-filters" style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="btn btn-default btn-sm btn-active-filter">All Items</button>
            </div>
            <div class="sultan-grid" id="sultan-items-container">
                <!-- JS Renders Here -->
            </div>
        </div>

        <!-- Right Cart -->
        <div class="sultan-sidebar">
            <h4>Current Cart</h4>
            <div id="cart-list" style="min-height: 200px; border-bottom: 1px solid #333; margin: 15px 0;">
                <p style="text-align: center; color: #888;">Cart is empty</p>
            </div>
            <div style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px;">
                <span>Total</span>
                <span id="cart-total-display">$0.00</span>
            </div>
            <button class="accent-btn" onclick="processDeskCheckout()">Checkout & Print</button>
        </div>
    </div>
</div>
